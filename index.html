<meta name='viewport' content='width=device-width, initial-scale=1'/><script src="https://cdn.tailwindcss.com"></script>

<div class="min-h-screen bg-[#020203] text-zinc-100 p-4 md:p-10 font-sans selection:bg-blue-500/30 relative overflow-hidden">
  
  <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-600/10 blur-[120px] rounded-full"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-emerald-600/10 blur-[120px] rounded-full"></div>

  <main class="max-w-6xl mx-auto relative z-10">
    
    <header class="flex justify-between items-center mb-12">
      <div class="space-y-1">
        <h1 class="text-3xl font-black tracking-tighter uppercase italic leading-none">
          SD<span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">STOCK</span>VIDEO
        </h1>
        <div class="h-[2px] w-12 bg-gradient-to-r from-blue-500 to-transparent"></div>
      </div>
      <div class="hidden sm:block text-right">
        <p class="text-[10px] font-mono text-zinc-500 tracking-[0.2em] uppercase">Engine: View4K Engine v2.0</p>
        <p id="status" class="text-[9px] font-mono text-emerald-500 tracking-widest uppercase">● System Online</p>
      </div>
    </header>

    <div class="grid lg:grid-cols-4 gap-8">
      
      <div class="lg:col-span-3 space-y-6">
        <div class="group relative bg-zinc-900/40 backdrop-blur-md rounded-[2rem] p-2 border border-white/10 shadow-2xl transition-all duration-500 hover:border-white/20">
          <div class="relative aspect-video rounded-[1.6rem] overflow-hidden bg-black">
            <video id="mainPlayer" class="w-full h-full object-contain" playsinline controls>
              <source id="videoSource" src="" type="video/mp4">
            </video>
            
            <div class="absolute bottom-6 left-6 pointer-events-none">
              <div id="resIndicator" class="translate-y-4 opacity-0 group-hover:translate-y-0 group-hover:opacity-100 transition-all duration-500 bg-black/60 backdrop-blur-xl border border-white/10 px-4 py-2 rounded-xl">
                <p class="text-[10px] text-zinc-400 font-mono uppercase tracking-widest mb-1">Active Stream</p>
                <p id="resLabel" class="text-sm font-bold text-white tracking-tight italic">Waiting for input...</p>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="lg:col-span-1 flex flex-col gap-4">
        <h2 class="text-[11px] font-bold text-zinc-500 uppercase tracking-[0.3em] mb-2 px-2">Library Assets</h2>
        
        <button onclick="loadMedia('View4K-SD-stock1.mp4', '4K ULTRA HD / 60FPS')" 
          class="group relative flex flex-col gap-3 p-5 bg-zinc-900/50 backdrop-blur-sm border border-white/5 rounded-3xl transition-all duration-300 hover:bg-white/5 hover:border-blue-500/40 hover:scale-[1.02] active:scale-95 shadow-lg">
          <div class="flex justify-between items-start w-full">
            <div class="p-2 bg-blue-500/10 rounded-lg group-hover:bg-blue-500/20 transition-colors">
              <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
            </div>
            <span class="text-[9px] font-black bg-blue-500 text-black px-2 py-0.5 rounded shadow-[0_0_15px_rgba(59,130,246,0.5)]">PRO</span>
          </div>
          <div class="text-left">
            <p class="text-xs font-bold text-zinc-200 group-hover:text-white transition-colors">View4K-SD-stock1</p>
            <p class="text-[10px] text-zinc-500 font-mono mt-1 italic">High bitrate source</p>
          </div>
        </button>

        <button onclick="loadMedia('View1080p-SD-stock2.mp4', '1080p FULL HD / Optimized')" 
          class="group relative flex flex-col gap-3 p-5 bg-zinc-900/50 backdrop-blur-sm border border-white/5 rounded-3xl transition-all duration-300 hover:bg-white/5 hover:border-emerald-500/40 hover:scale-[1.02] active:scale-95 shadow-lg">
          <div class="flex justify-between items-start w-full">
            <div class="p-2 bg-emerald-500/10 rounded-lg group-hover:bg-emerald-500/20 transition-colors">
              <svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            </div>
          </div>
          <div class="text-left">
            <p class="text-xs font-bold text-zinc-200 group-hover:text-white transition-colors">View1080p-SD-stock2</p>
            <p class="text-[10px] text-zinc-500 font-mono mt-1 italic">Standard playback</p>
          </div>
        </button>

      </div>
    </div>
  </main>
</div>

<script>
  function loadMedia(file, description) {
    const player = document.getElementById('mainPlayer');
    const source = document.getElementById('videoSource');
    const label = document.getElementById('resLabel');
    const status = document.getElementById('status');
    
    // Feedback visual de carga
    status.innerHTML = "● LOADING SOURCE...";
    status.classList.replace('text-emerald-500', 'text-amber-500');

    source.src = file;
    label.textContent = description;
    
    player.load();
    player.play().then(() => {
      status.innerHTML = "● LIVE STREAMING";
      status.classList.replace('text-amber-500', 'text-blue-500');
    });
  }
</script>
